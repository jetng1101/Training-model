defaults:
  - data: data
  - model: model

experiment_name: "cifar100-resnet50"
seed: 42
device: "cuda"

trainer:
  max_epochs: 100
  log_interval: 50
  checkpoint_dir: "checkpoints"

optimizer:
  name: "adamw"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  name: "cosine"
  min_lr: 1.0e-6
  warmup_epochs: 5

wandb:
  project: "cifar100-classification"
  entity: null
  tags: ["resnet50", "cifar100", "baseline"]
