dataset:
  name: "uoft-cs/cifar100"
  label_column: "fine_label"
  num_classes: 100
  image_column: "img"

loader:
  batch_size: 64
  num_workers: 4
  pin_memory: true

augmentation:
  image_size: 224
  train:
    random_horizontal_flip_probability: 0.5
    random_resized_crop:
      scale_min: 0.8
      scale_max: 1.0
      ratio_min: 0.9
      ratio_max: 1.1
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
      probability: 0.8
    coarse_dropout:
      max_holes: 1
      max_height: 56
      max_width: 56
      min_holes: 1
      min_height: 28
      min_width: 28
      fill_value: 0
      probability: 0.5
    normalize_mean: [0.5071, 0.4867, 0.4408]
    normalize_std: [0.2675, 0.2565, 0.2761]
  val:
    normalize_mean: [0.5071, 0.4867, 0.4408]
    normalize_std: [0.2675, 0.2565, 0.2761]
